# filebeat.yml — Shipper KhaiNet (logs → Kafka)
# Lee logs de Zeek, Suricata y Wazuh desde volúmenes compartidos
# Output a Kafka (172.25.0.2:9092) con routing por tipo de log

filebeat.inputs:

  # === Zeek conn.log → zeek-conn ===
  - type: log
    enabled: true
    paths:
      - /data/zeek/conn.log
    json.keys_under_root: true
    json.add_error_key: true
    fields:
      sensor: zeek
      log_type: conn
    fields_under_root: true
    tags: ["zeek-conn"]

  # === Zeek dns.log → zeek-dns ===
  - type: log
    enabled: true
    paths:
      - /data/zeek/dns.log
    json.keys_under_root: true
    json.add_error_key: true
    fields:
      sensor: zeek
      log_type: dns
    fields_under_root: true
    tags: ["zeek-dns"]

  # === Zeek http.log → zeek-http ===
  - type: log
    enabled: true
    paths:
      - /data/zeek/http.log
    json.keys_under_root: true
    json.add_error_key: true
    fields:
      sensor: zeek
      log_type: http
    fields_under_root: true
    tags: ["zeek-http"]

  # === Zeek ssl.log → zeek-ssl ===
  - type: log
    enabled: true
    paths:
      - /data/zeek/ssl.log
    json.keys_under_root: true
    json.add_error_key: true
    fields:
      sensor: zeek
      log_type: ssl
    fields_under_root: true
    tags: ["zeek-ssl"]

  # === Suricata eve.json → suricata-alerts ===
  - type: log
    enabled: true
    paths:
      - /data/suricata/eve.json
    json.keys_under_root: true
    json.add_error_key: true
    fields:
      sensor: suricata
      log_type: alerts
    fields_under_root: true
    tags: ["suricata-alerts"]

  # === Wazuh alerts.json → wazuh-events ===
  - type: log
    enabled: true
    paths:
      - /data/wazuh/alerts/alerts.json
    json.keys_under_root: true
    json.add_error_key: true
    fields:
      sensor: wazuh
      log_type: events
    fields_under_root: true
    tags: ["wazuh-events"]

# === Output a Kafka ===
output.kafka:
  enabled: true
  hosts: ["172.25.0.2:9092"]
  topic: '%{[sensor]}-%{[log_type]}'
  # Mapping de topics (fields_under_root: true → campos en raíz):
  #   zeek-conn → zeek-conn
  #   zeek-dns  → zeek-dns
  #   zeek-http → zeek-http
  #   zeek-ssl  → zeek-ssl
  #   suricata-alerts → suricata-alerts
  #   wazuh-events → wazuh-events
  key: '%{[sensor]}'
  partition.round_robin:
    reachable_only: false
  required_acks: 1
  compression: gzip
  max_message_bytes: 1000000

# Logging
logging.level: info
logging.to_files: true
logging.files:
  path: /var/log/filebeat
  name: filebeat.log
  keepfiles: 7
  permissions: 0644

# Procesadores
processors:
  - add_host_metadata:
      when.not.contains.tags: forwarded
  - add_fields:
      target: ''
      fields:
        platform: khainet
        version: "1.0"

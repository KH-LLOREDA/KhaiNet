<!-- ossec.conf — Config Wazuh Manager para KhaiNet -->
<ossec_config>
  <global>
    <jsonout_output>yes</jsonout_output>
    <alerts_log>yes</alerts_log>
    <logall>no</logall>
    <logall_json>no</logall_json>
    <email_notification>no</email_notification>
    <smtp_server>localhost</smtp_server>
    <email_from>wazuh@khainet.local</email_from>
    <email_to>admin@khainet.local</email_to>
  </global>

  <!-- Reglas -->
  <ruleset>
    <decoder_dir>ruleset/decoders</decoder_dir>
    <rule_dir>ruleset/rules</rule_dir>
    <rule_exclude>0215-policy_rules.xml</rule_exclude>
    <list>etc/lists/audit-keys</list>
    <decoder_dir>etc/decoders</decoder_dir>
    <rule_dir>etc/rules</rule_dir>
  </ruleset>

  <!-- Análisis de logs de Zeek y Suricata -->
  <localfile>
    <log_format>json</log_format>
    <location>/var/ossec/logs/zeek/conn.log</location>
  </localfile>

  <localfile>
    <log_format>json</log_format>
    <location>/var/ossec/logs/zeek/dns.log</location>
  </localfile>

  <localfile>
    <log_format>json</log_format>
    <location>/var/ossec/logs/zeek/http.log</location>
  </localfile>

  <localfile>
    <log_format>json</log_format>
    <location>/var/ossec/logs/suricata/eve.json</location>
  </localfile>

  <!-- Remote secure (agentes) -->
  <remote>
    <connection>secure</connection>
    <port>1514</port>
    <protocol>udp</protocol>
  </remote>

  <!-- Authd -->
  <auth>
    <disabled>no</disabled>
    <port>1515</port>
    <use_source_ip>no</use_source_ip>
    <force_insert>yes</force_insert>
    <force_time>0</force_time>
    <purge>yes</purge>
    <use_password>no</use_password>
    <limit_maxagents>yes</limit_maxagents>
    <cipher_level>high</cipher_level>
  </auth>

  <!-- Cluster -->
  <cluster>
    <name>khainet</name>
    <node_name>node01</node_name>
    <node_type>master</node_type>
    <key></key>
    <port>1516</port>
    <bind_addr>0.0.0.0</bind_addr>
    <nodes></nodes>
    <hidden>no</hidden>
    <disable>yes</disable>
  </cluster>

  <!-- Wodle: Vulnerability detection -->
  <wodle name="vulnerability-detector">
    <disabled>yes</disabled>
  </wodle>
</ossec_config>

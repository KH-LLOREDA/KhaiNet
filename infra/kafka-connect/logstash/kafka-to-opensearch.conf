# KhaiNet — Logstash: Kafka → OpenSearch sink
# Logstash lee eventos de Kafka y los indexa en OpenSearch
# 
# Se usa Logstash en lugar de Kafka Connect para OpenSearch porque el 
# Elasticsearch connector de Confluent (v15.1.2) no es compatible con
# OpenSearch 2.x (falla la verificación de versión).
# Logstash tiene un plugin nativo de OpenSearch output.

input {
  kafka {
    bootstrap_servers => "172.25.0.2:9092"
    topics => ["zeek-conn", "zeek-dns", "zeek-http", "zeek-ssl", "suricata-alerts", "wazuh-events", "brain-incidents"]
    group_id => "logstash-opensearch-sink"
    decorate_events => true
    auto_offset_reset => "latest"
    consumer_threads => 3
    fetch_max_bytes => 1048576
    max_poll_records => 500
    session_timeout_ms => 30000
    heartbeat_interval_ms => 10000
  }
}

filter {
  # Parse JSON messages from Kafka
  json {
    source => "message"
    remove_field => ["message"]
  }

  # Use Kafka topic name as OpenSearch index name
  ruby {
    code => '
      topic = event.get("[@metadata][kafka][topic]")
      event.set("[@metadata][index_name]", topic) if topic
    '
  }

  # Add ingest timestamp
  mutate {
    add_field => { "ingest_ts" => "%{@timestamp}" }
  }
}

output {
  opensearch {
    hosts => ["http://172.25.0.5:9200"]
    user => "admin"
    password => "Khainet2025Secure"
    index => "%{[@metadata][index_name]}"
  }

  # Debug output (comment out in production)
  # stdout { codec => rubydebug }
}

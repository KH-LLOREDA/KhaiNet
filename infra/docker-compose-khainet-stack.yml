# KhaiNet — Stack completo (docker-compose)
# Plataforma NDR open-source: Zeek, Suricata, Wazuh, Filebeat, Kafka, Kafka Connect, Logstash, OpenSearch, ClickHouse
# Desplegado en docker02 (172.26.10.98) via Portainer Stacks API
# Red: khainet-network (172.25.0.0/16)

version: "3.8"

services:
  # ============================================================
  # KAFKA — Bus de mensajes (KRaft, sin Zookeeper)
  # ============================================================
  kafka:
    image: apache/kafka:latest
    container_name: khainet-kafka
    restart: unless-stopped
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://172.26.10.98:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "9092:9092"
    volumes:
      - khainet-kafka-data:/var/lib/kafka/data
    networks:
      khainet-network:
        ipv4_address: 172.25.0.2

  # ============================================================
  # KAFKA UI — Interfaz web para Kafka
  # ============================================================
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: khainet-kafka-ui
    restart: unless-stopped
    environment:
      KAFKA_CLUSTERS_0_NAME: khainet
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_AUTOCREATE_TOPICS: "true"
    ports:
      - "8089:8080"
    networks:
      khainet-network:
        ipv4_address: 172.25.0.3
    depends_on:
      - kafka

  # ============================================================
  # OPENSEARCH — Data lake para logs y eventos (search/analytics)
  # ============================================================
  opensearch:
    image: opensearchproject/opensearch:2.16.0
    container_name: khainet-opensearch
    restart: unless-stopped
    environment:
      cluster.name: khainet-cluster
      node.name: khainet-opensearch-node1
      discovery.type: single-node
      bootstrap.memory_lock: "false"
      OPENSEARCH_JAVA_OPTS: "-Xms2g -Xmx2g"
      plugins.security.disabled: "true"
      OPENSEARCH_INITIAL_ADMIN_PASSWORD: Khainet2025Secure
    ports:
      - "9200:9200"
      - "9600:9600"
    volumes:
      - khainet-opensearch-data:/usr/share/opensearch/data
    networks:
      khainet-network:
        ipv4_address: 172.25.0.5
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"' || grep -q '\"status\":\"yellow\"' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 15
      start_period: 60s

  # ============================================================
  # OPENSEARCH DASHBOARDS — UI para OpenSearch
  # ============================================================
  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2.16.0
    container_name: khainet-opensearch-dashboards
    restart: unless-stopped
    environment:
      OPENSEARCH_HOSTS: http://172.25.0.5:9200
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 5601
      OPENSEARCH_SSL_VERIFICATION_MODE: none
      OPENSEARCH_REQUEST_HEADERS_ALLOWLIST: securitytenant,Authorization
    ports:
      - "5601:5601"
    command: >
      bash -c "echo 'opensearch_security.enabled: false' >> /usr/share/opensearch-dashboards/config/opensearch_dashboards.yml && exec ./opensearch-dashboards-docker-entrypoint.sh opensearch-dashboards"
    networks:
      khainet-network:
        ipv4_address: 172.25.0.4
    depends_on:
      - opensearch

  # ============================================================
  # CLICKHOUSE — Analytics columnar (queries rápidas sobre tráfico)
  # ============================================================
  clickhouse:
    image: clickhouse/clickhouse-server:24.8-alpine
    container_name: khainet-clickhouse
    restart: unless-stopped
    environment:
      CLICKHOUSE_DB: khainet
      CLICKHOUSE_USER: admin
      CLICKHOUSE_PASSWORD: Khainet2025!Secure
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    ports:
      - "8123:8123"
      - "9001:9000"
      - "9009:9009"
    volumes:
      - khainet-clickhouse-data:/var/lib/clickhouse
      - khainet-clickhouse-logs:/var/log/clickhouse-server
    networks:
      khainet-network:
        ipv4_address: 172.25.0.6
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8123/ping || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ============================================================
  # KAFKA CONNECT — Sinks de Kafka a ClickHouse
  # ============================================================
  kafka-connect:
    image: khainet-kafka-connect:latest
    container_name: khainet-kafka-connect
    restart: unless-stopped
    environment:
      CONNECT_BOOTSTRAP_SERVERS: 172.25.0.2:9092
      CONNECT_REST_ADVERTISED_HOST_NAME: 172.26.10.98
      CONNECT_REST_PORT: 8083
      CONNECT_GROUP_ID: khainet-connect
      CONNECT_CONFIG_STORAGE_TOPIC: connect-configs
      CONNECT_OFFSET_STORAGE_TOPIC: connect-offsets
      CONNECT_STATUS_STORAGE_TOPIC: connect-status
      CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_STATUS_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_KEY_CONVERTER_SCHEMAS_ENABLE: "false"
      CONNECT_VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
      CONNECT_INTERNAL_KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_INTERNAL_VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_PLUGIN_PATH: /usr/share/java/kafka-connect/plugins,/usr/share/confluent-hub-components
      CONNECT_LOG4J_LOGGERS: org.apache.zookeeper=ERROR,org.I0Itec.zkclient=ERROR,org.reflections=ERROR
    ports:
      - "8083:8083"
    volumes:
      - khainet-kafka-connect-jars:/etc/kafka-connect/jars
      - khainet-kafka-connect-secrets:/etc/kafka-connect/secrets
    networks:
      khainet-network:
        ipv4_address: 172.25.0.7
    depends_on:
      - kafka

  # ============================================================
  # LOGSTASH — Kafka → OpenSearch sink
  # ============================================================
  logstash:
    image: opensearchproject/logstash-oss-with-opensearch-output-plugin:7.16.3
    container_name: khainet-logstash
    restart: unless-stopped
    environment:
      LS_JAVA_OPTS: "-Xms512m -Xmx512m"
      LOG_LEVEL: info
    volumes:
      - khainet-logstash-config:/usr/share/logstash/pipeline:ro
    networks:
      khainet-network:
        ipv4_address: 172.25.0.8
    depends_on:
      - kafka
      - opensearch

  # ============================================================
  # ZEEK — Sensor de tráfico de red (genera logs JSON)
  # ============================================================
  zeek:
    image: zeek/zeek:7.0.0
    container_name: khainet-zeek
    restart: unless-stopped
    command: >
      /bin/bash -c "echo 'Zeek esperando PCAPs...' && while true; do
      if ls /data/pcap/*.pcap 1>/dev/null 2>&1; then
      echo 'Procesando PCAPs...' &&
      for f in /data/pcap/*.pcap; do
      echo \"Zeek: $$f\" &&
      cd /data/logs && zeek -r \"$$f\" -C LogAscii::use_json=T local 2>&1;
      done;
      echo 'Zeek: procesamiento completo. Logs en /data/logs/';
      ls -la /data/logs/;
      fi;
      sleep 30; done"
    volumes:
      - khainet-zeek-pcap:/data/pcap
      - khainet-zeek-logs:/data/logs
    networks:
      khainet-network:
        ipv4_address: 172.25.0.9

  # ============================================================
  # SURICATA — IDS (analiza PCAPs con reglas ET Open → eve.json)
  # ============================================================
  suricata:
    image: jasonish/suricata:7.0.0
    container_name: khainet-suricata
    restart: unless-stopped
    entrypoint: ["sh", "-c"]
    command: ["echo 'Suricata esperando PCAPs...' && while true; do if ls /data/pcap/*.pcap 1>/dev/null 2>&1; then echo 'Procesando PCAPs...' && for f in /data/pcap/*.pcap; do echo \"Suricata: $$f\" && suricata -r \"$$f\" -l /var/log/suricata --runmode single 2>&1; done; echo 'Suricata: procesamiento completo'; ls -la /var/log/suricata/; fi; sleep 30; done"]
    volumes:
      - khainet-suricata-pcap:/data/pcap
      - khainet-suricata-logs:/var/log/suricata
    networks:
      khainet-network:
        ipv4_address: 172.25.0.10

  # ============================================================
  # WAZUH — HIDS/SIEM manager
  # ============================================================
  wazuh:
    image: wazuh/wazuh-manager:4.7.0
    container_name: khainet-wazuh
    restart: unless-stopped
    environment:
      INDEXER_URL: 172.25.0.5
      FILEBEAT_SSL_VERIFICATION: "false"
    ports:
      - "1514:1514/udp"
      - "1515:1515/tcp"
      - "55000:55000/tcp"
    volumes:
      - khainet-wazuh-logs:/var/ossec/logs
      - khainet-wazuh-etc:/var/ossec/etc
      - khainet-wazuh-config:/wazuh-config-mount/etc:ro
      - khainet-wazuh-data:/var/ossec/data
    networks:
      khainet-network:
        ipv4_address: 172.25.0.11

  # ============================================================
  # FILEBEAT — Shipper (logs de sensores → Kafka)
  # ============================================================
  filebeat:
    image: docker.elastic.co/beats/filebeat:7.16.3
    container_name: khainet-filebeat
    restart: unless-stopped
    command: ["filebeat", "-e", "-c", "/config/filebeat.yml"]
    volumes:
      - khainet-filebeat-config:/config:ro
      - khainet-zeek-logs:/data/zeek:ro
      - khainet-suricata-logs:/data/suricata:ro
      - khainet-wazuh-logs:/data/wazuh:ro
    networks:
      khainet-network:
        ipv4_address: 172.25.0.12
    depends_on:
      - kafka
      - zeek
      - suricata
      - wazuh

# ============================================================
# NETWORKS
# ============================================================
networks:
  khainet-network:
    name: khainet-network
    driver: bridge
    ipam:
      config:
        - subnet: 172.25.0.0/16

# ============================================================
# VOLUMES
# ============================================================
volumes:
  khainet-kafka-data:
    name: khainet-kafka-data
  khainet-kafka-connect-jars:
    name: khainet-kafka-connect-jars
  khainet-kafka-connect-secrets:
    name: khainet-kafka-connect-secrets
  khainet-opensearch-data:
    name: khainet-opensearch-data
  khainet-clickhouse-data:
    name: khainet-clickhouse-data
  khainet-clickhouse-logs:
    name: khainet-clickhouse-logs
  khainet-logstash-config:
    name: khainet-logstash-config
  khainet-zeek-pcap:
    name: khainet-zeek-pcap
  khainet-zeek-logs:
    name: khainet-zeek-logs
  khainet-suricata-pcap:
    name: khainet-suricata-pcap
  khainet-suricata-logs:
    name: khainet-suricata-logs
  khainet-suricata-config:
    name: khainet-suricata-config
  khainet-suricata-rules:
    name: khainet-suricata-rules
  khainet-wazuh-logs:
    name: khainet-wazuh-logs
  khainet-wazuh-etc:
    name: khainet-wazuh-etc
  khainet-wazuh-config:
    name: khainet-wazuh-config
  khainet-wazuh-data:
    name: khainet-wazuh-data
  khainet-filebeat-config:
    name: khainet-filebeat-config
